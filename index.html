<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Alunos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

    <header class="display-5 bg-light text-center shadow p-3 mb-5">
        Cadastro de Alunos
    </header>
    <main class="container">
        <section>
            <div class="display-6">
                Formulário de Cadastro:
            </div>
            <div class="col-md-10 offset-md-1">
                <form onsubmit="save(); return false;" id="formAlunos">
                    <div class="row g-3 mt-3">
                        <label for="inputNome" class="col-2 form-label">Nome: </label>
                        <div class="col-10">
                            <input type="text" class="form-control" id="inputNome" required>
                        </div>
                    </div>
                    <div class="row g-3 mt-3">
                        <label for="inputEmail" class="col-2 form-label">Email: </label>
                        <div class="col-4">
                            <input type="text" class="form-control" id="inputEmail" required>
                        </div>
                        <label for="inputTelefone" class="col-2 form-label">Telefone: </label>
                        <div class="col-4">
                            <input type="text" class="form-control phone_with_ddd" id="inputTelefone" required>
                        </div>
                    </div>
                    <div class="row g-3 mt-3">
                        <label for="inputCurso" class="form-label col-2">Curso: </label>
                        <div class="col-4">
                            <select id="inputCurso" class="form-select col-5" required>
                                <option value=""selected>Selecione uma opção</option>
                                <option value="1">ADS</option>
                                <option value="2">GTI</option>
                                <option value="3">GE</option>
                                <option value="4">Eventos</option>
                            </select>
                        </div>
                    </div>
                    <div class="row g-3 mt-3">
                        <label for="" class="col-2">Turno: </label>
                        <div class="col-4">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="radioDefault" id="radioManha">
                                <label class="form-check-label" for="radioManha">
                                    Manhã
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="radioDefault" id="radioTarde"
                                    checked>
                                <label class="form-check-label" for="radioTarde">
                                    Tarde
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="radioDefault" id="radioNoite"
                                    checked>
                                <label class="form-check-label" for="radioNoite">
                                    Noite
                                </label>
                            </div>
                        </div>
                    </div>
                    <div class="row mb-3 mt-3">
                        <div class="col-sm-4">
                            <button type="submit" class="btn btn-primary">Cadastrar</button>
                        </div>
                    </div>
                </form>
            </div>
        </section>
        <hr>
        <section>
            <div class="display-6">
                Alunos Cadastrados: 
            </div>
            <table class="table" id="tableAlunos">
                <thead>
                    <tr>
                        <th scope="col">#</th>
                        <th scope="col">Nome</th>
                        <th scope="col">Email</th>
                        <th scope="col">Telefone</th>
                        <th scope="col" class="d-none d-md-table-cell">Curso</th>
                        <th scope="col" class="d-none d-md-table-cell">Turno</th>
                    </tr>
                </thead>
                <tbody>
                    
                </tbody>
            </table>
        </section>
    </main>

    <footer>

    </footer>

    <script src="js/jquery-3.6.0.min.js"></script>
    <script src="js/jquery.mask.min.js"></script>
    <script src="js/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
